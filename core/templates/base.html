<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соловьиный Пруд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .season-transition { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-white text-zinc-900 antialiased">
    <nav class="flex justify-between items-center p-8 md:p-12 border-b border-emerald-50 bg-white">
    <a href="{% url 'index' %}" class="group">
        <div class="text-3xl font-light tracking-tighter leading-none text-zinc-800 group-hover:text-emerald-800 transition">
            Соловьиный <br> <span class="text-emerald-200 group-hover:text-emerald-400">пруд</span>
        </div>
    </a>

    <div class="flex gap-8 md:gap-12 text-[11px] uppercase tracking-[0.2em] text-zinc-400 font-medium">
        <a href="{% url 'index' %}" class="hover:text-emerald-800 transition {% if request.resolver_match.url_name == 'index' %}text-emerald-900{% endif %}">Галерея</a>
        <a href="{% url 'events' %}" class="hover:text-emerald-800 transition {% if request.resolver_match.url_name == 'events' %}text-emerald-900{% endif %}">Мероприятия</a>
        <a href="{% url 'about' %}" class="hover:text-emerald-800 transition {% if request.resolver_match.url_name == 'about' %}text-emerald-900{% endif %}">О проекте</a>
    </div>
</nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="p-12 text-[10px] uppercase tracking-widest text-zinc-400 flex justify-between">
        <div>Овчинникова Ульяна / ИРсп-123</div>
        <div>2026</div>
    </footer>
</body>
</html>
